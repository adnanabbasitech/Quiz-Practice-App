 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">
<div class="quiz-container">

<!-- START -->
<div id="startScreen" class="card p-4 text-center">
  <h2>Select Subject</h2>
  <button class="btn btn-primary m-2" onclick="startQuiz('gk')">General Knowledge</button>
  <button class="btn btn-success m-2" onclick="startQuiz('science')">Science</button>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="card p-4 d-none">
  <div class="d-flex justify-content-between mb-3">
    <span id="questionCount"></span>
    <span class="timer">Time: <span id="time">0:30</span></span>
  </div>

  <h5 id="question"></h5>
  <div id="options" class="mt-3"></div>

  <!-- ✅ Finish Message -->
  <p id="finishMessage" class="text-success fw-bold mt-2 d-none">
    ✅ Exam finished. Click "Finish Exam" to see your result.
  </p>

  <div class="mt-4 d-flex justify-content-between">
    <button class="btn btn-secondary" onclick="prevQuestion()">Previous</button>
    <button id="nextBtn" class="btn btn-primary" onclick="nextQuestion()" disabled>Next</button>
  </div>

  <div class="text-end mt-3">
    <button class="btn btn-danger" onclick="finishQuiz()">Finish Exam</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="card p-4 text-center d-none">
  <h3>Final Result</h3>
  <p id="score"></p>
  <p id="correct"></p>
  <p id="attempted"></p>
  <p id="timeTaken"></p>
  <button class="btn btn-success" onclick="location.reload()">Restart</button>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
